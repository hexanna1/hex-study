<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hex Match Database</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page study-page-wide match-page">
      <header class="hero">
        <h1>Hex Match Database</h1>
      </header>

      <section class="layout study-layout-wide match-layout">
        <section class="panel board-panel study-board-panel-wide">
          <div class="board-topbar">
            <p id="match-status" class="turn-indicator">Turn: Red</p>
          </div>
          <svg id="board" class="board study-board-wide" aria-label="Match board"></svg>
        </section>

        <section class="detail-panel study-detail-panel-wide match-detail-panel">
          <div class="detail-card">
            <div class="detail-inline-row">
              <h2>Game</h2>
              <div class="match-game-controls">
                <select id="game-select" class="match-select" aria-label="Game"></select>
              </div>
            </div>
            <div class="detail-inline-row">
              <h2>View</h2>
              <div class="view-mode-toggle" role="group" aria-label="Candidate view">
                <button id="view-winrate-btn" class="view-mode-btn is-active" type="button" aria-pressed="true">Winrate</button>
                <button id="view-prior-btn" class="view-mode-btn" type="button" aria-pressed="false">Prior</button>
              </div>
            </div>
            <p id="player-names" class="match-player-row card-copy" aria-label="Players"></p>
            <div id="move-list" class="move-list" aria-label="Move list"></div>
            <div id="match-nav" class="study-nav" aria-label="Navigation">
              <div class="study-nav-group" aria-label="Move navigation">
                <button id="move-first-btn" class="study-nav-btn" type="button" aria-label="Start">|&lt;</button>
                <button id="move-prev-btn" class="study-nav-btn" type="button" aria-label="Previous move">&lt;</button>
                <button id="move-next-btn" class="study-nav-btn" type="button" aria-label="Next move">&gt;</button>
                <button id="move-last-btn" class="study-nav-btn" type="button" aria-label="End">&gt;|</button>
              </div>
              <div class="study-nav-group study-nav-secondary-group" aria-label="Game navigation">
                <button id="game-prev-btn" class="study-nav-btn" type="button" aria-label="Previous game">&lt;&lt;</button>
                <button id="game-next-btn" class="study-nav-btn" type="button" aria-label="Next game">&gt;&gt;</button>
              </div>
            </div>
            <p id="shortcut-hint" class="meta-copy shortcut-hint">Shortcuts: <kbd>p</kbd> previous, <kbd>n</kbd> next, <kbd>f</kbd> first, <kbd>l</kbd> last, <kbd>s</kbd> swap, <kbd>t</kbd> winrate/prior labels.</p>
            <p id="external-links" class="meta-copy"></p>
          </div>

          <div class="detail-card info-card match-graph-card">
            <div id="eval-graph-wrap" class="eval-graph-wrap">
              <svg id="eval-graph" class="eval-graph" aria-label="Match eval graph"></svg>
              <div id="eval-graph-tooltip" class="eval-graph-tooltip" hidden></div>
            </div>
          </div>
        </section>
      </section>

      <footer class="page-footer">
        <a href="./index.html">Home</a>
        <span class="footer-sep">·</span>
        <a href="https://github.com/hexanna1/hex-study">GitHub</a>
        <span class="footer-sep">·</span>
        <a href="https://www.hexwiki.net/index.php/User:Hexanna">HexWiki</a>
      </footer>

      <script src="./study_ui.js"></script>
      <script src="./move_tree.js"></script>
      <script src="./matches.js"></script>
    </main>
  </body>
</html>
